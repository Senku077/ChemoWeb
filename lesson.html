<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if (window.trustedTypes && window.trustedTypes.createPolicy) {
            try {
                window.trustedTypes.createPolicy('default', {
                    createHTML: (string) => string,
                    createScript: (string) => string,
                    createScriptURL: (string) => string,
                });
            } catch (e) {
                console.warn("Trusted Types default policy could not be registered:", e);
            }
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemoWeb - Lesson</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/lesson.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="logo">ChemoWeb</div>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-item">
                    <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                    Dashboard
                </a></li>
                <li><a href="#" id="quiz-link" class="nav-item">
                    <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm-2 14l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
                    Quizzes
                </a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="header" style="margin-bottom: 2rem;">
                <div class="breadcrumb" style="font-size: 0.9rem; color: var(--text-muted);">
                    <a href="index.html" style="color: var(--accent-cyan); text-decoration: none;">Dashboard</a> <span class="separator" style="margin: 0 0.5rem;">/</span> <span class="current" id="lesson-breadcrumb" style="color: var(--text-primary);">Loading...</span>
                </div>
            </header>

            <article class="lesson-article" style="max-width: 900px; margin: 0 auto; padding: 2.5rem; background: var(--bg-glass); border: 1px solid var(--border-subtle); border-radius: 12px; box-shadow: var(--shadow-md);">
                <h1 id="lesson-h1" style="font-size: 2.5rem; font-weight: 800; background: var(--grad-primary); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem;">Loading Class Material</h1>
                <p class="subtitle" id="lesson-subtitle" style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2.5rem;">Fetching from your teacher...</p>

                <div class="content-block" id="lesson-dynamic-text" style="color: var(--text-secondary); font-size: 1.05rem;">
                    <p style="color: var(--text-muted)">Please wait...</p>
                </div>

                <div id="completion-container" style="margin-top: 4rem; text-align: center; border-top: 1px solid var(--border-subtle); padding-top: 2.5rem; display: none;">
                    <h3 style="margin-bottom: 1rem; color: var(--text-primary);">Finished learning?</h3>
                    <button id="btn-mark-completed" class="btn" style="background: var(--brand-primary); color: white; padding: 1rem 2rem; font-size: 1.1rem; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(24, 101, 242, 0.4);">
                        Mark as Completed ✓
                    </button>
                    <p id="completion-status" style="margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted);"></p>
                </div>
            </article>
        </main>
    </div>
    
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/lesson.js"></script>
</body>
</html>
