<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        if (window.trustedTypes && window.trustedTypes.createPolicy) {
            try {
                window.trustedTypes.createPolicy('default', {
                    createHTML: (string) => string,
                    createScript: (string) => string,
                    createScriptURL: (string) => string,
                });
            } catch (e) {
                console.warn("Trusted Types default policy could not be registered:", e);
            }
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemoWeb - Login</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
</head>

<body>
    <div class="auth-layout">
        <div class="auth-container mode-login" id="auth-box">
            <div class="auth-header">
                <div class="auth-logo">ChemoWeb</div>
                <div class="auth-subtitle" id="auth-subtitle">Sign in to continue your learning journey</div>
            </div>

            <form id="auth-form" class="auth-form">

                <div id="signup-fields">
                    <div class="form-group">
                        <label for="display-name">Full Name</label>
                        <input type="text" id="display-name" class="modern-input" placeholder="First & Last Name"
                            required>
                    </div>
                </div>


                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="modern-input" placeholder="student@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="modern-input" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary auth-submit" id="auth-submit-btn">Sign In</button>
            </form>

            <div id="auth-error"></div>

            <div class="auth-divider">
                <span>or continue with</span>
            </div>

            <button type="button" class="btn-google" id="btn-google">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                Google
            </button>

            <div class="auth-switch">
                <span id="auth-switch-text">Don't have an account?</span>
                <a id="auth-switch-btn">Sign up</a>
            </div>

            <div style="text-align: center; margin-top: 2rem;">
                <a id="teacher-portal-link"
                    style="color: var(--text-muted); font-size: 0.75rem; text-decoration: none; cursor: pointer; transition: color 0.2s;"
                    onmouseover="this.style.color='var(--admin-accent)'"
                    onmouseout="this.style.color='var(--text-muted)'">Secure Teacher Access</a>
            </div>
        </div>
    </div>

    <script type="module" src="js/supabase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>

</html>
